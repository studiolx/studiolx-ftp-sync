name: FTP Inventory Sync

on:
  schedule:
    # Runs every day at 8:00 AM EST (13:00 UTC)
    # This is 1 hour before the Google Apps Script daily sync at 9 AM
    - cron: '0 13 * * 1-5'  # Mon-Fri only — adjust to '0 13 * * *' for 7 days

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  ftp-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth

      - name: Run FTP → Drive sync
        env:
          # FTP passwords stored as GitHub Secrets (never in code)
          FTP_SWCORP_PASS: ${{ secrets.FTP_SWCORP_PASS }}
          # FTP_EGLO_PASS: ${{ secrets.FTP_EGLO_PASS }}
          # FTP_NOURISON_PASS: ${{ secrets.FTP_NOURISON_PASS }}

          # Google service account JSON stored as GitHub Secret
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

        run: python ftp_to_drive.py
